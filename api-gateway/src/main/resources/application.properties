spring.application.name=api-gateway

server.port = 8765

eureka.client.serviceUrl.defaultZone = http://localhost:8761/eureka
spring.main.web-application-type=reactive

spring.cloud.gateway.server.webflux.routes[0].id=users-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://users-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.server.webflux.routes[1].id=currency-exchange
spring.cloud.gateway.server.webflux.routes[1].uri=lb://currency-exchange
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/currency-exchange/**

spring.cloud.gateway.server.webflux.routes[2].id=currency-conversion
spring.cloud.gateway.server.webflux.routes[2].uri=lb://currency-conversion
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/currency-conversion/**

spring.cloud.gateway.server.webflux.routes[3].id=bank-account
spring.cloud.gateway.server.webflux.routes[3].uri=lb://bank-account
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/bank-accounts/**